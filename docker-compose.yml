services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app:/app
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: PHP.Dockerfile
    working_dir: /app
    volumes:
      - ./app:/app
      - /app/vendor
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: developmentdb
      DB_USER: developer
      DB_PASS: secret123
    depends_on:
      - mysql

  mysql:
    image: mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: secret123
      MYSQL_USER: developer
      MYSQL_PASSWORD: secret123
      MYSQL_DATABASE: developmentdb
    volumes:
      - mysqldata:/var/lib/mysql
      # Mount SQL files directly so MariaDB entrypoint executes them in order.
      - ./app/database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ./app/database/migrations/002_add_roles_data.sql:/docker-entrypoint-initdb.d/002_add_roles_data.sql:ro
      - ./app/database/migrations/003_link_users_to_hairdressers.sql:/docker-entrypoint-initdb.d/003_link_users_to_hairdressers.sql:ro
      - ./app/database/migrations/004_normalize_availability_times.sql:/docker-entrypoint-initdb.d/004_normalize_availability_times.sql:ro
      - ./app/database/seeds/001_hairdressers_and_services.sql:/docker-entrypoint-initdb.d/101_hairdressers_and_services.sql:ro
      - ./app/database/seeds/002_demo_users.sql:/docker-entrypoint-initdb.d/102_demo_users.sql:ro
      - ./app/database/seeds/003_demo_availability.sql:/docker-entrypoint-initdb.d/103_demo_availability.sql:ro
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql

volumes:
  mysqldata: {}
